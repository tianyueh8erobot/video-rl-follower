params:
  seed: ${...seed}

  algo:
    # DexTrack uses `a2c_continuous_supervised` (their custom variant);
    # we use stock `a2c_continuous` since the supervised algo is bespoke.
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    separate: False

    space:
      continuous:
        mu_activation: None
        # DexTrack uses sigma_activation=None; our rl_games fork crashes
        # when sigma drops below 0 (Adam pushes raw param negative), so
        # use softplus to keep sigma > 0.  See commit a3d08cf rationale.
        sigma_activation: softplus
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: 'fixed'

    mlp:
      # DexTrack HumanoidPPOSupervised.yaml "net v4": huge MLP.
      units: [8192, 4096, 2048, 1024, 512, 256, 128]
      activation: elu
      d2rl: False
      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: ${if:${...checkpoint},True,False}
  load_path: ${...checkpoint}

  config:
    name: ${resolve_default:DexTrackSharpaPPO,${....experiment}}
    device_name: ${resolve_default:cuda:0,${....rl_device}}
    env_name: rlgpu
    multi_gpu: ${....multi_gpu}
    ppo: True
    mixed_precision: True
    normalize_input: True
    normalize_value: True
    normalize_advantage: True
    value_bootstrap: True               # DexTrack default

    reward_shaper:
      scale_value: 0.01

    # ── DexTrack hyperparams (HumanoidPPOSupervised.yaml L161-188) ────────
    num_actors: ${....task.env.numEnvs}
    gamma: 0.99
    tau: 0.95
    learning_rate: 5e-4                 # DexTrack 5e-4 (we had 1e-4)
    lr_schedule: adaptive
    kl_threshold: 0.008                 # DexTrack 0.008 (we had 0.016)
    score_to_win: 20000
    max_epochs: ${resolve_default:5000,${....max_iterations}}
    save_best_after: 50
    save_frequency: 200
    print_stats: True
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: True
    e_clip: 0.2                         # DexTrack 0.2 (we had 0.1)
    horizon_length: 32                  # DexTrack 32 (we had 16)
    seq_length: 4                       # DexTrack seq_len: 4
    mini_epochs: 5                      # DexTrack 5 (we had 4)
    critic_coef: 4.0
    clip_value: True
    bounds_loss_coef: 0.0001
    # minibatch_size == num_actors (auto-scales with numEnvs in wfranka script).
    # batch_size = num_actors × horizon_length = numEnvs × 32; with
    # minibatch_size = numEnvs, that gives 32 minibatch updates per epoch.
    minibatch_size: ${....task.env.numEnvs}

    defer_summaries_sec: 5
    summaries_interval_sec_min: 5
    summaries_interval_sec_max: 300

    # Extra keys this fork's train.py reads.  None of them are active here.
    good_reset_boundary: 0
    use_others_experience: 'none'
    off_policy_ratio: 1.0
    expl_type: 'none'
    expl_reward_coef_embd_size: 32
    expl_reward_coef_scale: 1.0
    expl_reward_type: rnd
    expl_coef_block_size: 4096

    player:
      deterministic: False
      games_num: 1000
      print_stats: False
