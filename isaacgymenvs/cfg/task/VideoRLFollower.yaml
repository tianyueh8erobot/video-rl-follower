defaults:
  - _self_

name: VideoRLFollower

physics_engine: ${..physics_engine}

env:
  # ----- VideoRLFollower additions -----
  # Path to the JSON trajectory produced by tools/process_maniptrans_trajectory.py
  # Resolved relative to the project root if not absolute.
  trajectoryPath: data/trajectories/example_g0.json

  # If True, spawn the object whose URDF the trajectory specifies (and use
  # trajectory.object.start_pose as the initial pose).  If the trajectory has
  # no urdf_path, this flag is silently ignored and we fall back to the base
  # SimToolReal asset path (controlled by ``objectName``).
  useTrajectoryObject: True

  # Object physics knobs.  ManipTrans's _create_obj_assets (dexhandmanip_sh.py:572)
  # uses fix_base_link=False and DOES NOT set disable_gravity, i.e. real gravity
  # is on; the "G=0 → restore" curriculum mentioned in the paper is sim-level
  # (gym.set_sim_params at runtime), not asset-level.  We follow the same
  # convention: object has gravity, sim_params can be relaxed if the user wants
  # an early-training crutch.
  objectDisableGravity: False
  objectAngularDamping: 0.0
  objectLinearDamping: 0.0

  # ── Legacy hand-pose follow-up reward ────────────────────────────────────
  # KEPT only for the populate_obs_and_states_buffers cache + observation
  # exposure (so policy still sees wrist + fingertip goals).  These weights
  # NO LONGER feed the reward (compute_kuka_reward dropped them in favour of
  # imitRewardScale below).  Kept here so older yaml configs don't break.
  handPoseRewardScale:
    wristPos: 0.0       # superseded by imitRewardScale.eefPos
    wristRot: 0.0       # superseded by imitRewardScale.eefRot
    fingertip: 0.0      # superseded by imitRewardScale.{index,middle,...}Tip
    lambdaWristPos: 30.0
    lambdaWristRot: 5.0
    lambdaFingertip: 50.0

  exposeHandGoalToPolicy: True

  # ── ManipTrans Stage-1 imitation reward (R_imit, paper coefficients) ────
  # See dexhandimitator.py:1115-1172.  Set enable=0 to disable R_imit entirely.
  # MANO-keypoint-target → 27 Sharpa link distances are computed via the
  # to_hand mapping (paper-style); per-group exp-decay is then weighted.
  # Velocity / power terms from the paper are NOT yet implemented (the env
  # does not expose target velocities or dof_force) and contribute 0.
  imitRewardScale:
    enable:           1.0
    eefPos:           0.1
    # Coarse wrist-position term (lambda=4 → exp(-2)=0.13 at 50cm) so the
    # policy gets gradient signal at >10cm.  Default 0 keeps the original
    # paper reward; set >0 to enable.  See env.py:_compute_imit_reward.
    eefPosWide:       0.0
    lambdaEefPosWide: 4.0
    eefRot:           0.6
    thumbTip:         0.9
    indexTip:         0.8
    middleTip:        0.75
    ringTip:          0.6
    pinkyTip:         0.6
    level1:           0.5
    level2:           0.3
    lambdaEefPos:     40.0
    lambdaEefRot:      1.0
    lambdaThumbTip:  100.0
    lambdaIndexTip:   90.0
    lambdaMiddleTip:  80.0
    lambdaRingTip:    60.0
    lambdaPinkyTip:   60.0
    lambdaLevel1:     50.0
    lambdaLevel2:     40.0

  # ── ManipTrans-style reset (Stage-2) ─────────────────────────────────────
  # If True, on each episode reset overwrite the hand DOFs (slots 7..7+22)
  # with opt_dof_pos[seq_idx] from the retarget pkl, so RL starts from a
  # ManipTrans-warm-started pre-grasp pose rather than the SimToolReal default.
  # The arm DOFs (slots 0..7) are still SimToolReal-randomized — we don't IK
  # to opt_wrist_pos because the floating-base ManipTrans setup doesn't
  # constrain the arm.
  useRetargetDofInit: True

  # If True, sample a random sub-goal frame as the episode start (and align
  # sub_goal_idx to it).  False → always start at frame 0.
  randomStateInit: True

  # Deprecated: kept only so older yaml configs don't choke on missing key.
  fullHandTrackingScale:
    enable: 0.0

  # ----- SimToolReal-inherited settings (kept) -----
  # if given, will override the device setting in gym.
  numEnvs: ${resolve_default:8192,${...num_envs}}

  envSpacing: 1.2
  episodeLength: 600
  # enableCameraSensors: False  # Setting to True will significantly slow down the environment (about 50% FPS)
  enableCameraSensors: True  # Updated vec_task.py code to allow this to be True and still be fast, as long as enable_viewer_sync=False
                             # Thus, we can leave this on by default without sacrificing speed, just need to make sure that enable_viewer_sync=False
                             # And if we need to capture images, then we can set enable_viewer_sync=True
  enableDebugVis: False
  evalStats: False  # extra evaluation-time statistics

  clampAbsObservations: 10.0

  stiffnessScale: 1.0
  forceLimitScale: 1.0
  useRelativeControl: False
  dofSpeedScale: 1.5  # often set to 1.0
  handMovingAverage: 0.1  # often set to 0.1 or 1.0
  armMovingAverage: 0.1  # often set to 0.1 or 1.0
  dofSpeedScaleFinal: ${eval:"None"}  # often set to 1.0
  armMovingAverageFinal: ${eval:"None"}  # often set to 0.1
  handMovingAverageFinal: ${eval:"None"}  # often set to 0.1

  controlFrequencyInv: 1 # 60 Hz

  # ── Zero SimToolReal randomization for the trajectory-driven object.
  # Our subclass override of reset_object_pose places the object at the
  # trajectory's sub_goal_idx pose exactly (mirroring ManipTrans
  # _reset_default).  Random noise / rotation would desync the object
  # from the goal pose computed offline by tools/process_maniptrans_trajectory.py.
  resetPositionNoiseX: 0.0
  resetPositionNoiseY: 0.0
  resetPositionNoiseZ: 0.0
  randomizeObjectRotation: False
  resetDofPosRandomIntervalFingers: 0.1
  resetDofPosRandomIntervalArm: 0.1
  resetDofVelRandomInterval: 0.5

  # Table reset settings — table_z=0.415 to match trajectory preprocessing
  # (object_start_pose's z is computed assuming table center at 0.415).
  tableResetZ: 0.415
  tableResetZRange: 0.0
  tableObjectZOffset: 0.25

  # Random forces applied to the object
  forceScale: 20.0
  forceProbRange: [0.001, 0.1]
  forceDecay: 0.0
  forceDecayInterval: 0.08
  forceOnlyWhenLifted: True
  torqueScale: 2.0
  torqueProbRange: [0.001, 0.1]
  torqueDecay: 0.0
  torqueDecayInterval: 0.08
  torqueOnlyWhenLifted: True

  # Random velocity impulses applied to the object
  linVelImpulseProbRange: [0.001, 0.1]
  linVelImpulseScale: 0.0
  linVelImpulseOnlyWhenLifted: True
  angVelImpulseProbRange: [0.001, 0.1]
  angVelImpulseScale: 0.0
  angVelImpulseOnlyWhenLifted: True

  # ── DENSE pickup-shaping rewards: ZEROED for ManipTrans×SimToolReal hybrid.
  # The user explicitly asked to drop "拿起的reward" (pickup dense shaping)
  # and keep only the SimToolReal SPARSE goal bonus (reachGoalBonus below).
  # If you want to revert to the SimToolReal pure-pickup setup, restore the
  # original 20/300/200/50 values (and set imitRewardScale.enable=0).
  liftingRewScale: 0.0           # was 20.0  — dense object-lift shaping
  liftingBonus: 0.0              # was 300.0 — sparse "object above threshold" bonus
  liftingBonusThreshold: 0.15
  keypointRewScale: 0.0          # was 200.0 — dense object→goal-keypoint shaping
  distanceDeltaRewScale: 0.0     # was 50.0  — dense fingertip→object shaping
  # ── SPARSE goal-reaching bonus: KEPT (this is the SimToolReal sparse signal).
  reachGoalBonus: 1000.0         # bonus when keypoints_max_dist ≤ tolerance for N steps
  # ── Action / object-velocity penalties: KEPT, defaults preserved.
  kukaActionsPenaltyScale: 0.03
  handActionsPenaltyScale: 0.003
  fallDistance: 0.24
  fallPenalty: 0.0
  objectLinVelPenaltyScale: 0.0
  objectAngVelPenaltyScale: 0.0

  privilegedActions: False
  privilegedActionsTorque: 0.02

  keypointScale: 1.5
  objectBaseSize: 0.04

  observationType: "full_state"
  successTolerance: 0.075
  targetSuccessTolerance: 0.01
  evalSuccessTolerance: null  # If None, will use the default success tolerance. Otherwise, will use this value for evaluation.
  toleranceCurriculumIncrement: 0.9  # multiplicative
  toleranceCurriculumInterval: 3000  # in env steps across all agents, with 8192 this is 3000 * 8192 = 24.6M env steps
  maxConsecutiveSuccesses: 50
  successSteps: 10  # how many steps we should be within the tolerance before we declare a success
  forceConsecutiveNearGoalSteps: False  # If True, require near goal consecutively for successSteps

  saveStates: False
  saveStatesFile: "rootTensorsDofStates.bin"

  loadInitialStates: False
  loadStatesFile: "rootTensorsDofStates.bin"

  goodResetBoundary: 0

  objectName: "handle_head_primitives"
  # Forced True at runtime by VideoRLFollower env (kept here for clarity).
  useFixedGoalStates: True
  useFixedInitObjectPose: False
  fixedGoalStates: null
  fixedGoalStatesJsonPath: null

  use_hack_object_pos_offset: False
  hack_object_pos_offset: 0.05

  record_data: False
  record_data_num_steps: 1000

  capture_video: True  # This will not work unless headless=False or enableCameraSensors=True, both make it slower

  # Assuming 60Hz, this takes a 10s video recording every 100s of simulation time
  # When training many envs in parallel, it runs roughly 4-10Hz real-time, so this is 6-15x slower than real-time
  # Thus, it records a video every 600-1500s (10-25 minutes) of real time
  capture_video_freq: 6_000
  capture_video_len: 600

  turn_off_extra_obs: False
  turn_off_extra_obs_slowly: False

  turn_off_palm_vel_obs: False
  turn_off_palm_vel_obs_slowly: False

  turn_off_object_vel_obs: False
  turn_off_object_vel_obs_slowly: False

  # related to Tyler Curriculum
  use_obs_dropout: False
  init_tyler_curriculum_scale: 0.0
  VISUALIZE_PD_TARGET_AS_BLUE_ROBOT: False
  withTableForceSensor: False
  curriculumSuccessRatio: 0.6
  resetWhenDropped: False
  timeToUpdateTylerCurriculum: 5
  updateStepSizeTylerCurriculum: 0.01

  # related to Asymmetric Observation
  # The hand-goal channels (``wrist_goal`` and ``fingertip_goal_local``) are
  # added by the VideoRLFollower subclass *after* super().__init__(), and the
  # gym observation_space / state_space and obs delay queue are resized to
  # match.  We intentionally do NOT add them to obs_list/state_list here
  # because SimToolReal's __init__ enforces that every entry must be a known
  # key in its hard-coded obs_type_size_dict.
  stateList: ["joint_pos", "joint_vel", "prev_action_targets", "palm_pos", "palm_rot", "palm_vel", "object_rot", "object_vel", "fingertip_pos_rel_palm", "keypoints_rel_palm", "keypoints_rel_goal", "object_scales", "closest_keypoint_max_dist", "closest_fingertip_dist", "lifted_object", "progress", "successes", "reward"]
  obsList: ["joint_pos", "joint_vel", "prev_action_targets", "palm_pos", "palm_rot", "object_rot", "fingertip_pos_rel_palm", "keypoints_rel_palm", "keypoints_rel_goal", "object_scales"]
  fixedSizeKeypointReward: True
  fixedSize: [0.141, 0.03025, 0.0271]

  startArmHigher: False  # Set to False typically for training, but for evaluation, we typically start the arm higher

  # some pose_reaching_env specific settings
  use_green_robot: True
  sanity_check_controls: False
  add_prev_targets_to_obs: False
  jointVelocityPenaltyScale: 0.0
  jointAccelerationPenaltyScale: 0.0

  # goal sampling settings
  goalSamplingType: "delta" # "absolute" or "delta" or "coin_flip"
  targetVolumeRegionScale: 1.0 # scale the target volume region by this factor
  deltaGoalDistance: 0.1 # distance to the goal in meters
  deltaRotationDegrees: 90.0 # rotation of the goal in degrees
  targetVolumeMins: [-0.35, -0.2, 0.6]  # Either null/None or a 3-element list of [x_min, y_min, z_min]
  targetVolumeMaxs: [0.35, 0.2, 0.95]  # Either null/None or a 3-element list of [x_max, y_max, z_max]

  # Delays and noise
  useObsDelay: True
  obsDelayMax: 3

  useActionDelay: True
  actionDelayMax: 3

  useObjectStateDelayNoise: True
  objectStateDelayMax: 10
  objectStateXyzNoiseStd: 0.01
  objectStateRotationNoiseDegrees: 5.0
  objectScaleNoiseMultiplierRange: [1.0, 1.0]

  jointVelocityObsNoiseStd: 0.1

  forceNoReset: False  # If True, will not reset the environment, useful for sim2sim testing
  objectStartPose: ${eval:"None"}  # If None, will use the default object start pose. Otherwise, a 7-element list of [x, y, z, qx, qy, qz, qw]
  goalObjectPose: ${eval:"None"}  # If None, does nothing. Otherwise, forces the goal object pose to be this value. Must be a 7-element list of [x, y, z, qx, qy, qz, qw]

  handleHeadTypes: ["hammer", "screwdriver", "marker", "spatula", "eraser", "brush"]

  # asset Friction settings
  modifyAssetFrictions: True
  robotFriction: 0.5
  fingerTipFriction: 1.5
  objectFriction: 0.5
  tableFriction: 0.5

  asset:
    # Right Sharpa Wave hand on KUKA iiwa14, assembled by
    # tools/build_iiwa14_right_sharpa_urdf.py from the official
    # right_sharpa_wave_with_flange.urdf + the SimToolReal iiwa14 chain.
    # The base SimToolReal env auto-detects the chirality from the substring
    # "right_sharpa" / "left_sharpa" in this path (see env.use_right_sharpa /
    # use_left_sharpa).
    robot: "urdf/kuka_sharpa_description/iiwa14_right_sharpa_adjusted_restricted.urdf"

    table: "urdf/table_narrow.urdf"

task:
  randomize: False
  randomization_params:
    frequency: 720 # Define how many simulation steps between generating new randomizations

    observations:
        range: [0, .01]
        range_correlated: [0, .01]
        operation: "additive"
        distribution: "gaussian"
        schedule: "constant"  # turn on noise after `schedule_steps` num steps
        schedule_steps: 5000
    actions:
        range: [0., .01]
        range_correlated: [0., .01]
        operation: "additive"
        distribution: "gaussian"
        schedule: "linear"  # linearly interpolate between 0 randomization and full range
        schedule_steps: 5000
    sim_params:
      gravity:
        range: [0, 0.3]
        operation: "additive"
        distribution: "gaussian"

    actor_params:
      robot:
        # scale:
        #   range: [0.999, 1.001]
        #   operation: "scaling"
        #   distribution: "uniform"
        #   setup_only: True # Property will only be randomized once before simulation is started. See Domain Randomization Documentation for more info.
        color: True
        dof_properties:
          damping:
            range: [0.7, 1.3]
            operation: "scaling"
            distribution: "loguniform"
          stiffness:
            range: [0.7, 1.3]
            operation: "scaling"
            distribution: "loguniform"
          effort:
            range: [0.7, 1.3]
            operation: "scaling"
            distribution: "uniform"
          friction:
            range: [0.7, 1.3]
            operation: "scaling"
            distribution: "uniform"
          armature:
            range: [0.7, 1.3]
            operation: "scaling"
            distribution: "uniform"
          # lower:
          #   range: [-5.0, 5.0]
          #   operation: "additive"
          #   distribution: "uniform"
          # upper:
          #   range: [-5.0, 5.0]
          #   operation: "additive"
          #   distribution: "uniform"

        rigid_body_properties:
          mass:
            range: [0.7, 1.3] # change when runtime API is available
            operation: "scaling"
            distribution: "uniform"
            setup_only: True # Property will only be randomized once before simulation is started. See Domain Randomization Documentation for more info.

        rigid_shape_properties:
          friction:
            num_buckets: 100
            range: [0.7, 1.3]
            operation: "scaling"
            distribution: "uniform"
          restitution:
            num_buckets: 100
            range: [0.0, 0.3]
            operation: "additive"
            distribution: "uniform"
      object:
        # scale:
        #   # range: [0.7, 1.3]
        #   range: [0.999, 1.001]
        #   operation: "scaling"
        #   distribution: "uniform"
        #   setup_only: True # Property will only be randomized once before simulation is started. See Domain Randomization Documentation for more info.
        rigid_body_properties:
          mass:
            range: [0.7, 1.3] # after fixing the API expand it even more
            operation: "scaling"
            distribution: "uniform"
            setup_only: True # Property will only be randomized once before simulation is started. See Domain Randomization Documentation for more info.
        rigid_shape_properties:
          friction:
            num_buckets: 100
            range: [0.7, 1.3]
            operation: "scaling"
            distribution: "uniform"
          restitution:
            num_buckets: 100
            range: [0.0, 0.3]
            operation: "additive"
            distribution: "uniform"

sim:
  substeps: 2
  dt: ${eval:"1/60"} # 1/60
  up_axis: "z"
  use_gpu_pipeline: ${eq:${...pipeline},"gpu"}
  num_client_threads: 8

  gravity: [0.0, 0.0, -9.81]
  physx:
    num_threads: 6
    solver_type: 1  # 0: pgs, 1: tgs
    num_position_iterations: 8
    # num_velocity_iterations: 8  # Consider trying with this
    num_velocity_iterations: 0

    max_gpu_contact_pairs: ${eval:"8*1024*1024"} # 8*1024*1024
    num_subscenes: ${....num_subscenes}
    # contact_offset: 0.02  # Consider trying with this
    contact_offset: 0.002
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 1000.0
    default_buffer_size_multiplier: 25.0
    contact_collection: 0 # 0: CC_NEVER (don't collect contact info), 1: CC_LAST_SUBSTEP (collect only contacts on last substep), 2: CC_ALL_SUBSTEPS (broken - do not use!)
